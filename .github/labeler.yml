backend:
  - changed-files:
      - any-glob-to-any-file: 'backend/**'

frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**'

tests:
  - changed-files:
      - any-glob-to-any-file: 'backend/tests/**'

docs:
  - changed-files:
      - any-glob-to-any-file: ['*.md', 'docs/**']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**', '.pre-commit-config.yaml', 'Justfile']

docker:
  - changed-files:
      - any-glob-to-any-file: ['docker-compose.yml', '**/Dockerfile']
